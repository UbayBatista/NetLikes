services:
  db:
    image: postgres:15-alpine
    container_name: postgres_db
    restart: always
    environment:
      - POSTGRES_USER=netlikes_user
      - POSTGRES_PASSWORD=1234
      - POSTGRES_DB=netlikes
    ports:
      - "5432:5432"
    networks:
      - app-network

  backend:
    build:
      context: ./backend/netlikes
      dockerfile: Dockerfile
    container_name: spring_backend
    ports:
      - "8080:8080"
    environment:
      - SPRING_DATASOURCE_URL=jdbc:postgresql://db:5432/netlikes
      - SPRING_DATASOURCE_USERNAME=netlikes_user
      - SPRING_DATASOURCE_PASSWORD=1234
      - SPRING_JPA_HIBERNATE_DDL_AUTO=update
      - DISCOURSE.API.USERNAME=system
      - DISCOURSE.API.URL=http://host.docker.internal
      - DISCOURSE.CATEGORY.MOVIES.ID=5
    depends_on:
      - db
    networks:
      - app-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: angular_frontend
    ports:
      - "4200:80"
    depends_on:
      - backend
    networks:
      - app-network
  
  proxy:
    image: nginx:alpine
    container_name: proxy_limpiador
    ports:
      - "80:80"
    volumes:
      - ./proxy.conf:/etc/nginx/nginx.conf
    networks:
      - app-network

networks:
  app-network:
    driver: bridge

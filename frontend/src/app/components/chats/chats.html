<div class="foro-container" [class.show-chat]="selectedChat">

    <aside class="sidebar-users">
         <app-social-chats-users [newChatName]="userFriend"
            [newChatId]="chatId" (clickedUser)="seeChat($event)"></app-social-chats-users>
    </aside>

    <main class="chat-main">
        <app-social-chats-menssages [person]="userFriend" [selectedUserChat]="chatId" (return)="returnToList()"></app-social-chats-menssages>
    </main>

</div>

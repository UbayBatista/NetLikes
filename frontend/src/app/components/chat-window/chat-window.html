<div class="chat-container" style="display: flex; flex-direction: column; height: 100vh; width: 100%;">
  <header class="chat-header">
    <button class="mobile-back-btn" (click)="goBack()"><i class="bi bi-arrow-left"></i></button>
    <h2>{{ ForumTitle }}</h2>
  </header>
  
  <div class="messages-viewport" style="flex-grow: 1; width: 100%;">
    @if (safeForumUrl) {
      <iframe 
        [src]="safeForumUrl" 
        width="100%" 
        height="100%" 
        frameborder="0">
      </iframe>
    }
  </div>
</div>

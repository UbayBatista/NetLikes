<div class="modal-overlay" (click)="onClose()">
  <div class="modal-container" (click)="$event.stopPropagation()">
    
    <div class="modal-content">
      <h3 style="margin-top: 0; font-size: 1.25rem; font-weight: 600; margin-bottom: 12px;">Verificación</h3>
      <p class="modal-message">Para continuar, por favor introduce tu contraseña actual.</p>
      
      <div style="margin-top: 20px;">
        <input 
          type="password" 
          class="modal-input" 
          [(ngModel)]="password" 
          placeholder="Contraseña" 
          (keyup.enter)="verify()"
          [disabled]="isLoading">
      </div>

      @if (errorMessage) {
        <p style="color: #ed4956; font-size: 0.85rem; margin-top: 12px; margin-bottom: 0;">
          {{ errorMessage }}
        </p>
      }
    </div>

    <div class="modal-actions">
      <button class="btn-confirm" (click)="verify()" [disabled]="isLoading">
        {{ isLoading ? 'Verificando...' : 'Confirmar' }}
      </button>
      <button class="btn-cancel" (click)="onClose()" [disabled]="isLoading">
        Cancelar
      </button>
    </div>

  </div>
</div>
